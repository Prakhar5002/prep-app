<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Prep · FAANG + Mobile Frontend</title>
  <link rel="stylesheet" href="styles/app.css" />
  <link rel="stylesheet" href="vendor/prism.css" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Toggle menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <a href="#/" class="brand">
      <span class="brand-mark">⌘</span>
      <span class="brand-text">Prep</span>
    </a>
    <button class="search-trigger" id="searchTrigger" aria-label="Search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Search topics…</span>
      <kbd>⌘K</kbd>
    </button>
    <div class="topbar-actions">
      <button class="icon-btn" id="progressToggle" aria-label="Mark as studied" title="Mark this topic as studied">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </button>
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="Module navigation">
    <div class="sidebar-header">
      <div class="sidebar-stat">
        <span id="progressCount">0</span> / <span id="progressTotal">0</span> studied
      </div>
      <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <small>Prep Site v1 · Phase 1 build</small>
    </div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main -->
  <main class="main" id="main">
    <article class="content" id="content">
      <!-- Topic content rendered here by app.js -->
    </article>
    <aside class="toc" id="toc" aria-label="Table of contents">
      <div class="toc-header">On this page</div>
      <ul class="toc-list" id="tocList"></ul>
    </aside>
  </main>

  <!-- Search modal -->
  <div class="search-modal" id="searchModal" role="dialog" aria-label="Search" hidden>
    <div class="search-backdrop" id="searchBackdrop"></div>
    <div class="search-panel">
      <div class="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Search topics, sections, tags…" autocomplete="off" />
        <kbd>esc</kbd>
      </div>
      <div class="search-results" id="searchResults"></div>
      <div class="search-footer">
        <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
        <span><kbd>↵</kbd> open</span>
        <span><kbd>esc</kbd> close</span>
      </div>
    </div>
  </div>

  <!-- Mobile floating TOC button -->
  <button class="toc-fab" id="tocFab" aria-label="Show contents on this page">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  </button>

  <!-- Vendor scripts (offline-safe — included locally) -->
  <script src="vendor/prism.js"></script>

  <!-- Content registry (loads first) -->
  <script src="scripts/content/_index.js"></script>

  <!-- Topic content files -->
  <script src="scripts/content/js-execution-context.js"></script>
  <script src="scripts/content/js-closures.js"></script>
  <script src="scripts/content/js-this.js"></script>
  <script src="scripts/content/js-scope-chain.js"></script>
  <script src="scripts/content/js-event-loop.js"></script>
  <script src="scripts/content/js-hoisting-tdz.js"></script>
  <script src="scripts/content/js-prototypes.js"></script>
  <script src="scripts/content/js-promises.js"></script>
  <script src="scripts/content/js-memory-gc.js"></script>
  <script src="scripts/content/react-reconciliation.js"></script>
  <script src="scripts/content/react-hooks.js"></script>
  <script src="scripts/content/react-concurrent.js"></script>
  <script src="scripts/content/react-performance.js"></script>
  <script src="scripts/content/react-state.js"></script>
  <script src="scripts/content/react-ssr.js"></script>
  <script src="scripts/content/react-testing.js"></script>
  <script src="scripts/content/react-typescript.js"></script>
  <script src="scripts/content/react-patterns.js"></script>
  <script src="scripts/content/perf-crp.js"></script>
  <script src="scripts/content/perf-cwv-deep.js"></script>
  <script src="scripts/content/sd-framework.js"></script>
  <script src="scripts/content/sd-cases.js"></script>
  <script src="scripts/content/perf-memory.js"></script>
  <script src="scripts/content/perf-images-fonts.js"></script>
  <script src="scripts/content/perf-bundle-loading.js"></script>
  <script src="scripts/content/perf-runtime.js"></script>
  <script src="scripts/content/build-optimizations.js"></script>
  <script src="scripts/content/build-bundlers.js"></script>
  <script src="scripts/content/build-compilers.js"></script>
  <script src="scripts/content/build-pm.js"></script>
  <script src="scripts/content/dbg-chrome.js"></script>
  <script src="scripts/content/dbg-react.js"></script>
  <script src="scripts/content/dbg-network.js"></script>
  <script src="scripts/content/dbg-memory.js"></script>
  <script src="scripts/content/dbg-mobile.js"></script>
  <script src="scripts/content/dsa-complexity.js"></script>
  <script src="scripts/content/rn-architecture.js"></script>
  <script src="scripts/content/rn-components.js"></script>
  <script src="scripts/content/rn-navigation.js"></script>
  <script src="scripts/content/rn-state-data.js"></script>
  <script src="scripts/content/rn-styling.js"></script>
  <script src="scripts/content/rn-animations.js"></script>
  <script src="scripts/content/rn-native-modules.js"></script>
  <script src="scripts/content/rn-device-apis.js"></script>
  <script src="scripts/content/rn-performance.js"></script>
  <script src="scripts/content/rn-build-release.js"></script>
  <script src="scripts/content/rn-testing.js"></script>
  <script src="scripts/content/rn-debugging.js"></script>
  <script src="scripts/content/rn-gotchas.js"></script>
  <script src="scripts/content/rn-system-design.js"></script>

  <!-- App (loads last) -->
  <script src="scripts/app.js"></script>
</body>
</html>
